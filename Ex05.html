<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lógica com JavaScript</title>
</head>
<body>

<script>
    let numero= prompt("Insira um numero")

    if (numero % 5 === 0){
        alert("O Numero" + numero + "é multiplo de 5");
    }else {
            alert("O Numero" + numero + "Não é multiplo de 5");
        }
    

    
</script>

</body>
</html>
