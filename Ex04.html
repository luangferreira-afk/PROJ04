<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lógica com JavaScript</title>
</head>
<body>

<script>
    let valor = prompt("preço da compra")

if (valor >= 100 ){
alert("Você Ganhou um desconto de 10%!!");
let desconto = valor * 0.10;
let valorfinal = valor - desconto;
alert("O Valor final é: R$"+ valorfinal.toFixed(2));
} 


    
    
</script>

</body>
</html>
