<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lógica com JavaScript</title>
</head>
<body>

<script>
    let numero = prompt("insira um número");

    if (numero > 0){
        alert("numero positivo");
    }else if (numero < 0){
        alert("numero negativo");
    } else if(numero == 0) {
        alert("0 é nulo")
    } else {
        alert("Digite um valor numérico")
    }
        

    
    
    
</script>

</body>
</html>
